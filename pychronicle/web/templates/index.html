<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PyChronicle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: linear-gradient(135deg, #0F0F2E 0%, #1a0f4b 50%, #2d0f5e 100%);
      --surface: rgba(255, 255, 255, 0.08);
      --surface-dark: rgba(0, 0, 0, 0.3);
      --text: #F8F9FF;
      --text-dim: #B8C5FF;
      --primary: #FF6B9D;
      --secondary: #00D9FF;
      --accent1: #FFD700;
      --accent2: #FF4081;
      --accent3: #7C3AED;
      --accent4: #06B6D4;
      --accent5: #EC4899;
      --accent6: #14B8A6;
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', 'SFMono-Regular', monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(circle at 20% 50%, rgba(255, 107, 157, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(0, 217, 255, 0.1) 0%, transparent 50%);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255, 255, 255, 0.03) 0px,
        rgba(255, 255, 255, 0.03) 1px,
        transparent 1px,
        transparent 2px
      );
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
      position: relative;
      z-index: 2;
    }

    header {
      margin-bottom: 3rem;
      padding: 2rem;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 107, 157, 0.15) 0%, rgba(0, 217, 255, 0.15) 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .wordmark {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      background: linear-gradient(90deg, #FF6B9D, #00D9FF, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }

    .session-tag {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      background: linear-gradient(90deg, #FF6B9D, #7C3AED);
      border-radius: 20px;
      color: #FFF;
      font-weight: 600;
    }

    .transport {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      align-items: center;
      gap: 1.2rem;
      background: linear-gradient(135deg, rgba(255, 107, 157, 0.2) 0%, rgba(124, 58, 237, 0.2) 100%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 1.5rem 1.5rem;
      margin-bottom: 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(255, 107, 157, 0.15);
    }

    .transport-btn {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      border: 2px solid;
      border-image: linear-gradient(135deg, #FF6B9D, #00D9FF) 1;
      background: linear-gradient(135deg, #FF6B9D, #7C3AED);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-weight: 700;
      box-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
    }

    .transport-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(255, 107, 157, 0.8), 0 0 60px rgba(0, 217, 255, 0.4);
    }

    .transport-btn:active { transform: scale(0.95); }

    .counter {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      background: linear-gradient(90deg, #FF6B9D, #00D9FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 8px rgba(255, 107, 157, 0.5);
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      white-space: nowrap;
      font-weight: 700;
    }

    .counter-sep { opacity: 0.5; margin: 0 0.2rem; }

    .scrubber {
      position: relative;
      height: 3rem;
      cursor: pointer;
      touch-action: none;
    }

    .scrubber-track {
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, #FF6B9D, #7C3AED, #00D9FF, #14B8A6);
      transform: translateY(-50%);
      border-radius: 3px;
      box-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
    }

    .scrubber-ticks { position: absolute; inset: 0; }

    .tick {
      position: absolute;
      top: 50%;
      width: 3px;
      height: 14px;
      transform: translate(-50%, -50%);
      border-radius: 2px;
      opacity: 0.9;
      filter: drop-shadow(0 0 4px currentColor);
    }

    .scrubber-playhead {
      position: absolute;
      top: 2px; bottom: 2px;
      width: 4px;
      background: linear-gradient(180deg, #FFD700, #FF6B9D);
      transform: translateX(-50%);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.8), 0 0 30px rgba(255, 107, 157, 0.6);
      border-radius: 2px;
    }

    .scrubber-playhead::before {
      content: '';
      position: absolute;
      top: -8px; left: 50%;
      width: 14px; height: 14px;
      background: linear-gradient(135deg, #FFD700, #FF6B9D);
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
    }

    .time-readout {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--accent4);
      min-width: 7rem;
      text-align: right;
      white-space: nowrap;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 2rem;
    }

    .tracks { grid-row: 1 / 3; }
    .state-panel { grid-column: 2; }
    .history-panel { grid-column: 2; }

    h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      background: linear-gradient(90deg, #FF6B9D, #00D9FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 1rem;
      font-weight: 700;
    }

    #trackList { 
      list-style: none; 
      margin: 0; 
      padding: 0; 
      display: flex; 
      flex-direction: column; 
      gap: 0.5rem; 
    }

    .track {
      display: flex; 
      align-items: center; 
      gap: 0.7rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--text-dim);
      border: 2px solid transparent;
      background: rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .track:hover { 
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 107, 157, 0.5);
      transform: translateX(4px);
    }

    .track.selected {
      background: linear-gradient(135deg, rgba(255, 107, 157, 0.3), rgba(124, 58, 237, 0.3));
      border-color: #FF6B9D;
      color: var(--text);
      box-shadow: 0 0 15px rgba(255, 107, 157, 0.4);
    }

    .dot { 
      width: 10px; 
      height: 10px; 
      border-radius: 50%; 
      flex-shrink: 0;
      box-shadow: 0 0 8px currentColor;
    }

    .track-name { 
      overflow: hidden; 
      text-overflow: ellipsis; 
      white-space: nowrap; 
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
      border: 2px solid;
      border-image: linear-gradient(135deg, var(--accent, #FF6B9D), rgba(255, 107, 157, 0.2)) 1;
      border-radius: 12px;
      padding: 1.2rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(var(--accent, 255, 107, 157), 0.15);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 48px rgba(var(--accent, 255, 107, 157), 0.3);
    }

    .card.pulse { animation: pulse 0.6s ease-out; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 107, 157, 0.7), 0 8px 32px rgba(255, 107, 157, 0.15); }
      100% { box-shadow: 0 0 0 15px rgba(255, 107, 157, 0), 0 8px 32px rgba(255, 107, 157, 0.15); }
    }

    .card-name {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-value {
      font-family: var(--font-mono);
      font-size: 1.2rem;
      word-break: break-all;
      color: var(--text);
      font-weight: 600;
    }

    .card-value.dim { 
      color: var(--text-dim); 
      font-size: 0.9rem; 
      font-style: italic; 
    }

    .card-meta {
      margin-top: 0.8rem;
      display: flex; 
      gap: 0.8rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .history-panel h2 span {
      color: var(--text);
      text-transform: none;
      letter-spacing: 0;
      font-family: var(--font-mono);
      font-size: 0.95rem;
    }

    .history-strip {
      background: linear-gradient(135deg, rgba(255, 107, 157, 0.1) 0%, rgba(0, 217, 255, 0.1) 100%);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 1.5rem;
      min-height: 120px;
      display: flex;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    .sparkline { 
      width: 100%; 
      height: 100px;
      filter: drop-shadow(0 2px 4px rgba(255, 107, 157, 0.3));
    }

    .history-chips { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 0.7rem; 
    }

    .chip {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border: 2px solid;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(5px);
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .chip:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px currentColor;
    }

    #emptyState {
      margin-top: 2rem;
      text-align: center;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 1rem;
      padding: 2rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px dashed rgba(255, 255, 255, 0.1);
    }

    #emptyState code { 
      color: #FFD700;
      font-weight: 600;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      .tracks { grid-row: auto; }
      .state-panel, .history-panel { grid-column: 1; }
      .transport { grid-template-columns: auto 1fr; }
      .counter { grid-column: 2; text-align: right; }
      .scrubber { grid-column: 1 / -1; order: 3; }
      .time-readout { grid-column: 1 / -1; order: 4; text-align: left; }
      .cards { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="wordmark">⚡ PYCHRONICLE</div>
        <div class="subtitle">chronicle your program's variables in technicolor</div>
      </div>
      <div class="session-tag" id="sessionTag"></div>
    </header>

    <section class="transport" aria-label="Playback controls">
      <button id="playBtn" class="transport-btn" aria-label="Play">▶</button>
      <div class="counter">
        <span id="counterIndex">000</span><span class="counter-sep">/</span><span id="counterTotal">000</span>
      </div>
      <div class="scrubber" id="scrubber">
        <div class="scrubber-track"></div>
        <div class="scrubber-ticks" id="ticks"></div>
        <div class="scrubber-playhead" id="playhead"></div>
      </div>
      <div class="time-readout" id="timeReadout">t+0.000s</div>
    </section>

    <main class="grid">
      <aside class="tracks" aria-label="Variables">
        <h2>📺 Tracks</h2>
        <ul id="trackList"></ul>
      </aside>

      <section class="state-panel" aria-label="State at playhead">
        <h2>💾 State at playhead</h2>
        <div class="cards" id="stateCards"></div>
      </section>

      <section class="history-panel" aria-label="Variable history">
        <h2>📊 History — <span id="historyVar">select a track</span></h2>
        <div class="history-strip" id="historyStrip"></div>
      </section>
    </main>

    <div id="emptyState" hidden>
      🎬 No traces yet. Run your instrumented script to populate <code>Data/traces.db</code>, then reload this page.
    </div>
  </div>

  <script>
    const state = {
      traces: [],
      variables: [],
      tMin: 0,
      tMax: 1,
      scrub: 0,
      selectedVar: null,
      playing: false,
      playStart: null,
      playStartScrub: 0,
    };

    const PALETTE = ['#FF6B9D', '#00D9FF', '#FFD700', '#7C3AED', '#06B6D4', '#EC4899', '#14B8A6', '#FF4081'];

    function colorFor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
      return PALETTE[h % PALETTE.length];
    }

    function fmtValue(raw) {
      let v;
      try { v = JSON.parse(raw); } catch (e) { v = raw; }
      if (typeof v === 'string') return '"' + v + '"';
      if (v === null) return 'None';
      if (typeof v === 'boolean') return v ? 'True' : 'False';
      return String(v);
    }

    async function load() {
      const [tracesRes, varsRes] = await Promise.all([
        fetch('/api/traces'),
        fetch('/api/variables'),
      ]);
      state.traces = await tracesRes.json();
      state.variables = await varsRes.json();

      if (!state.traces.length) {
        document.getElementById('emptyState').hidden = false;
        return;
      }

      state.tMin = state.traces[0].timestamp;
      state.tMax = state.traces[state.traces.length - 1].timestamp;
      state.scrub = state.tMax;
      state.selectedVar = state.variables[0] || null;

      document.getElementById('counterTotal').textContent = String(state.traces.length).padStart(3, '0');
      const sid = state.traces[0].session_id;
      document.getElementById('sessionTag').textContent = sid ? '🎯 session ' + sid : '';

      renderTracks();
      renderTicks();
      renderAll();

      document.getElementById('scrubber').addEventListener('pointerdown', onScrubStart);
      document.getElementById('playBtn').addEventListener('click', togglePlay);
    }

    function renderTracks() {
      const ul = document.getElementById('trackList');
      ul.innerHTML = '';
      state.variables.forEach((name) => {
        const li = document.createElement('li');
        li.className = 'track' + (name === state.selectedVar ? ' selected' : '');
        li.innerHTML = '<span class="dot" style="background:' + colorFor(name) + '; box-shadow: 0 0 12px ' + colorFor(name) + '"></span>' +
                        '<span class="track-name">' + name + '</span>';
        li.addEventListener('click', () => {
          state.selectedVar = name;
          renderTracks();
          renderHistory();
        });
        ul.appendChild(li);
      });
    }

    function renderTicks() {
      const wrap = document.getElementById('ticks');
      wrap.innerHTML = '';
      const span = (state.tMax - state.tMin) || 1;
      state.traces.forEach((tr) => {
        const pct = ((tr.timestamp - state.tMin) / span) * 100;
        const tick = document.createElement('div');
        tick.className = 'tick';
        tick.style.left = pct + '%';
        tick.style.background = colorFor(tr.variable_name);
        tick.style.color = colorFor(tr.variable_name);
        wrap.appendChild(tick);
      });
    }

    function latestStateAt(time) {
      const map = {};
      for (const tr of state.traces) {
        if (tr.timestamp <= time) map[tr.variable_name] = tr;
        else break;
      }
      return map;
    }

    function currentIndex() {
      let idx = -1;
      for (let i = 0; i < state.traces.length; i++) {
        if (state.traces[i].timestamp <= state.scrub) idx = i;
        else break;
      }
      return idx;
    }

    function renderAll() {
      renderStateCards();
      renderHistory();
      renderPlayhead();
      renderCounter();
    }

    function renderStateCards() {
      const map = latestStateAt(state.scrub);
      const container = document.getElementById('stateCards');
      container.innerHTML = '';
      const idx = currentIndex();
      const justChanged = idx >= 0 ? state.traces[idx].variable_name : null;

      state.variables.forEach((name) => {
        const tr = map[name];
        const card = document.createElement('div');
        card.className = 'card' + (name === justChanged ? ' pulse' : '');
        card.style.setProperty('--accent', colorFor(name));
        if (!tr) {
          card.innerHTML = '<div class="card-name">' + name + '</div>' +
                            '<div class="card-value dim">⏳ not yet assigned</div>';
        } else {
          card.innerHTML = '<div class="card-name">' + name + '</div>' +
                            '<div class="card-value">' + fmtValue(tr.serialized_value) + '</div>' +
                            '<div class="card-meta"><span>🏷️ ' + (tr.value_type || 'unknown') + '</span>' +
                            '<span>🔹 ' + tr.scope + '</span><span>📍 L' + tr.line_number + '</span></div>';
        }
        container.appendChild(card);
      });
    }

    function renderHistory() {
      document.getElementById('historyVar').textContent = state.selectedVar || 'select a track';
      const strip = document.getElementById('historyStrip');
      strip.innerHTML = '';
      if (!state.selectedVar) return;

      const history = state.traces.filter((t) => t.variable_name === state.selectedVar);
      const span = (state.tMax - state.tMin) || 1;
      const color = colorFor(state.selectedVar);

      const numericVals = history.map((h) => {
        try {
          const v = JSON.parse(h.serialized_value);
          return typeof v === 'number' ? v : null;
        } catch (e) { return null; }
      });
      const allNumeric = history.length > 1 && numericVals.every((v) => v !== null);

      if (allNumeric) {
        const min = Math.min(...numericVals);
        const max = Math.max(...numericVals);
        const vSpan = (max - min) || 1;
        const W = 100, H = 100;
        let path = '';
        history.forEach((h, i) => {
          const x = ((h.timestamp - state.tMin) / span) * W;
          const y = H - ((numericVals[i] - min) / vSpan) * (H - 20) - 10;
          path += (i === 0 ? 'M' : 'L') + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';
        });
        strip.innerHTML = '<svg viewBox="0 0 100 100" preserveAspectRatio="none" class="sparkline">' +
          '<defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">' +
          '<stop offset="0%" style="stop-color:' + color + ';stop-opacity:1" />' +
          '<stop offset="100%" style="stop-color:' + color + ';stop-opacity:0.3" />' +
          '</linearGradient></defs>' +
          '<path d="' + path + '" fill="url(#grad)" />' +
          '<path d="' + path + '" fill="none" stroke="' + color + '" stroke-width="2" vector-effect="non-scaling-stroke"/>' +
          '</svg>';
      } else {
        const row = document.createElement('div');
        row.className = 'history-chips';
        history.forEach((h) => {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.style.borderColor = color;
          chip.style.color = color;
          chip.textContent = fmtValue(h.serialized_value);
          row.appendChild(chip);
        });
        strip.appendChild(row);
      }
    }

    function renderPlayhead() {
      const span = (state.tMax - state.tMin) || 1;
      const pct = ((state.scrub - state.tMin) / span) * 100;
      document.getElementById('playhead').style.left = pct + '%';
    }

    function renderCounter() {
      const idx = currentIndex();
      document.getElementById('counterIndex').textContent = String(Math.max(idx + 1, 0)).padStart(3, '0');
      document.getElementById('timeReadout').textContent = 't+' + (state.scrub - state.tMin).toFixed(3) + 's';
    }

    function onScrubStart(e) {
      const track = document.getElementById('scrubber');
      const move = (ev) => {
        const rect = track.getBoundingClientRect();
        const clientX = ev.clientX !== undefined ? ev.clientX : ev.touches[0].clientX;
        const x = clientX - rect.left;
        const pct = Math.min(Math.max(x / rect.width, 0), 1);
        state.scrub = state.tMin + pct * (state.tMax - state.tMin);
        renderAll();
      };
      move(e);
      const up = () => {
        window.removeEventListener('pointermove', move);
        window.removeEventListener('pointerup', up);
      };
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
    }

    function togglePlay() {
      state.playing = !state.playing;
      document.getElementById('playBtn').innerHTML = state.playing ? '⏸' : '▶';
      if (state.playing) {
        if (state.scrub >= state.tMax) state.scrub = state.tMin;
        state.playStart = performance.now();
        state.playStartScrub = state.scrub;
        requestAnimationFrame(tick);
      }
    }

    function tick(now) {
      if (!state.playing) return;
      const DURATION_MS = 6000;
      const span = state.tMax - state.tMin || 1;
      const elapsedFrac = (now - state.playStart) / DURATION_MS;
      state.scrub = state.playStartScrub + elapsedFrac * span;
      if (state.scrub >= state.tMax) {
        state.scrub = state.tMax;
        state.playing = false;
        document.getElementById('playBtn').innerHTML = '▶';
      }
      renderAll();
      if (state.playing) requestAnimationFrame(tick);
    }

    load();
  </script>
</body>
</html>
